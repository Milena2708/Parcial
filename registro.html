<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Gestor Académico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Crear Cuenta</h2>
        <form id="formRegistro">
            <input type="text" id="nombres" placeholder="Nombres" required> <input type="text" id="apellidos" placeholder="Apellidos" required> <input type="email" id="correo" placeholder="Correo" required> <input type="number" id="dni" placeholder="DNI (8 dígitos)" required> <input type="password" id="password" placeholder="Contraseña (mín. 6)" required> <input type="text" id="carrera" placeholder="Carrera" required> <input type="number" id="ciclo" placeholder="Ciclo" required> <input type="text" id="ciudad" placeholder="Ciudad" required> <button type="submit">Registrar Estudiante</button>
        </form>
        <p><a href="login.html">¿Ya tienes cuenta? Loguéate</a></p>
    </div>
    <script src="auth-register.js"></script>
</body>
</html>
