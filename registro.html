<div class="container">
        <h2>Crear Cuenta</h2>
            <form onsubmit="registrarUsuario(event)">
                    <input type="text" id="nombres" placeholder="Nombres" required>
                            <input type="text" id="apellidos" placeholder="Apellidos" required>
                                    <input type="email" id="correo" placeholder="Correo" required>
                                            <input type="number" id="dni" placeholder="DNI (8 dígitos)" required>
                                                    <input type="password" id="password" placeholder="Contraseña (min 6)" required>
                                                            <input type="text" id="carrera" placeholder="Carrera" required>
                                                                    <input type="number" id="ciclo" placeholder="Ciclo" required>
                                                                            <input type="text" id="ciudad" placeholder="Ciudad" required>
                                                                                    <button type="submit">Registrar</button>
                                                                                        </form>
                                                                                            <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
                                                                                            </div>
