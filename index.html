<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor Académico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Cargando aplicación...</h2>
    </div>

    <script>
        // Redirección inmediata basada en la sesión
        window.onload = () => {
            const sesion = localStorage.getItem('sesionActiva');
            if (sesion) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        };
    </script>
</body>
</html>
