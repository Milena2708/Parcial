                                        <script>
                                                // Lógica de redirección inicial [cite: 84, 115]
                                                        window.onload = function() {
                                                                    const session = JSON.parse(localStorage.getItem('sesionActiva')); // [cite: 89]
                                                                                
                                                                                            if (session) {
                                                                                                            // Si hay sesión, va directo al dashboard [cite: 23, 84]
                                                                                                                            window.location.href = 'dashboard.html';
                                                                                                                                        } else {
                                                                                                                                                        // Si no hay sesión, debe loguearse [cite: 84, 85]
                                                                                                                                                                        window.location.href = 'login.html';
                                                                                                                                                                                    }
                                                                                                                                                                                            };
                                                                                                                                                                                                </script>
